<div class="container-fluid h-100 d-flex flex-column pb-0">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="font-weight-bold p-0 mb-0">Filter item</h2>
        <a class="btn btn-link p-0" (click)="onClosed()">
            Close
        </a>
    </div>

    <form [formGroup]="addOnSearchForm">
        <div class="form-row mt-3">
            <div class="form-group col-lg-12 col-md-12 col-12">
                <label for="searchStr" class="required">Filter text</label>
                <input type="text" class="form-control" id="searchStr" formControlName="searchStr"
                    (blur)="logValidationErrors()" autocomplete="off">
                <div *ngIf="formErrors.searchStr">
                    <div class="input-validation-error-message">{{formErrors.searchStr}}</div>
                </div>
            </div>
        </div>
        <div class="form-row mt-3" formGroupName="searchByGrp">
            <div class="form-group col-lg-12 col-md-12 col-12">
                <label for="" class="required">Filter by</label>
                <div class="mt-2" *ngIf="addOnSearchForm.get('searchByGrp')?.errors?.atLeastOne">
                    <div class="input-validation-error-message">
                        At least one checkbox must be selected.
                    </div>
                </div>
                <div class="custom-control custom-checkbox mt-4">
                    <input type="checkbox" class="custom-control-input" [id]="'searchByName'" formControlName="name"
                        (change)="0">
                    <label class="custom-control-label" [attr.for]="'searchByName'">Item name</label>
                </div>
                <div class="custom-control custom-checkbox mt-4">
                    <input type="checkbox" class="custom-control-input" [id]="'searchByDesc'"
                        formControlName="description" (change)="0">
                    <label class="custom-control-label" [attr.for]="'searchByDesc'">Item description</label>
                </div>
                <div class="custom-control custom-checkbox mt-4">
                    <input type="checkbox" class="custom-control-input" [id]="'searchByParams'"
                        formControlName="recentlyCreated" (change)="0">
                    <label class="custom-control-label" [attr.for]="'searchByParams'">Recently created</label>
                </div>
            </div>
        </div>
    </form>
    <div class="row mt-4">
        <div class="col-6">
            <button class="btn btn-secondary btn-block" (click)="onClosed()">Cancel</button>
        </div>
        <div class="col-6">
            <button class="btn btn-primary btn-block" (click)="search()">Search</button>
        </div>
    </div>
</div>
