<div class="">
    <div class="row">
        <div class="col-lg-12 col-md-12 col-12 d-flex">
            <h1 class="font-weight-bold">Flow model</h1>
            <a class="btn btn-link addBtn" *ngIf="isFlowModelCURDAccess" routerLink='add_flow_model' [class.disabled]="!isFlowModelCURDAccess" (click)="addFlowModel()">
                <span class="mr-2 lc-icon-Add"></span>
                <span class="font-weight-normal">Add flow model</span>
            </a>
        </div>
    </div>
    <div class="row mt-4" *ngIf="flowModels.length">
        <div class="col-xl-3 col-lg-3 col-md-12 col-sm-12 col-12 border_right pl_0">
            <div class="container">
                <div class="mt-4">
                    <ng-container *ngIf="flowModels.length; else noDataFound">
                        <ul class="" *ngFor="let flow of flowModels">
                            <li (click)="getFlowModelById(flow?.id)" [class.active]="flow.id === activeFlow">
                                <div class="title">
                                    <span class="user_name">{{flow?.name}}</span> &nbsp;
                                    <span class="workspace_name ws_badge ml-2" *ngIf="flow?.recentlyAdded">
                                        Recently created
                                    </span>
                                    <span class="workspace_name ws_badge ml-2" *ngIf="flow?.recentlyUpdated">
                                        Recently updated
                                    </span>
                                </div>
                            </li>
                        </ul>
                    </ng-container>
                    <ng-template #noDataFound>
                        <div>
                            <span class="text-center" style="display: grid;">No data found</span>
                        </div>
                    </ng-template>
                </div>
            </div>
        </div>
        <div class="col-xl-9 col-lg-9 col-md-12 col-sm-12 col-12 user_details pr-0">
            <div class="container">
                <div class="row">
                    <a class="btn btn-link" *ngIf="isFlowModelCURDAccess" [class.disabled]="!isFlowModelCURDAccess" (click)="editFlowModel(selectedFlow)">
                        <span class="iconlabel mr-2 lc-icon-Edit-alt-2"></span>
                        <span class="very-small-text">Edit</span>
                    </a>
                    <a class="btn btn-link" *ngIf="isFlowModelCURDAccess" [class.disabled]="!isFlowModelCURDAccess" (click)="deleteFlowModelById(selectedFlow?.id, selectedFlow?.connectedToWebflow)">
                        <span class="iconlabel mr-2 lc-icon-Trash-alt"></span>
                        <span class="very-small-text">Remove</span>
                    </a>
                </div>
                <div class="mt-2">
                    <div class="details_div">
                        <label for="">Name</label>
                        <p class="p_style">
                            {{selectedFlow?.name}}
                        </p>
                    </div>
                    <div class="details_div">
                        <label for="">Description</label>
                        <textarea class="form-control txtarea" autosize rows="1" cols="5" [value]="[selectedFlow?.description ? selectedFlow?.description : '-']" readonly></textarea>
                    </div>
                    <div class="details_div">
                        <label for="">Property</label>
                        <p class="p_style">
                            {{selectedFlow?.flowType?.name}}
                        </p>
                    </div>
                    <div class="details_div">
                        <label for="">Activity model</label>
                        <div class="row card_row mt-2">
                            <ng-container *ngFor="let model of selectedFlow?.flowActivityModelDataList; index as i; last as isLast">
                                <div class="col-xl-3 col-lg-3 col-md-12 col-sm-12 col-12 align-self-center">
                                    <div class="card text-center card_style mt-4" [class.selected_card_style]="model?.sequence === activeCard" (click)="selectedCard(model)">
                                        <a class="btn btn-link pt-2 pr-0 pb-0 pl-lg-2">
                                            <span class="badge badge-secondary float-left">
                                                {{model?.sequence}}
                                            </span>
                                        </a>
                                        <div class="card-body pt-0">
                                            <h5 class="card-title">
                                                {{model?.activityModelData?.name}}
                                            </h5>
                                        </div>
                                    </div>
                                </div>
                                <div class="right_arrow" *ngIf="!isLast">
                                    <i class="arrow right mt-4"></i>
                                </div>
                            </ng-container>
                        </div>
                    </div>
                    <div class="details_div">
                        <label for="">Description</label>
                        <p class="p_style">
                            {{selectedCardDetails?.description}}
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
