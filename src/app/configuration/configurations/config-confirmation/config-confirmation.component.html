<div class="container">
    <button class="btn btn-link p-0 top_closed_btn" (click)="onClosed()">
        Close
    </button>
    <div class="row mt-4">
        <div class="col-lg-12 col-md-12 col-12 d-flex p-0">
            <h1 class="font-weight-bold">Connected Item(s)</h1>
        </div>
    </div>
    <div class="row">
        <div class="col-lg-12 col-md-12 col-12">
            <p>Script engine group can not be deleted as it's connected to the item(s) listed below:</p>
            <div class="tblHg">
                <table class="table table-borderless table-responsive m-0">
                    <tr *ngFor="let item of connectedItems; let i = index">
                        <td>
                            {{i+1}}.
                        </td>
                        <td>
                            {{item}}
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>
