<div class="container">
    <div class="row">
        <div class="col-lg-12 col-md-12 col-12 d-flex">
            <h1 class="font-weight-bold">Import</h1>
        </div>
    </div>

    <!-- Desktop View *ngIf="scrWidth > 768" -->
    <ng-container>
        <mat-stepper [orientation]="(stepperOrientation | async)!" [linear]="false" #importStepper>
            <mat-step [label]="'Workspace: ' + workspaceName" [editable]="true">
                <app-import-workspace></app-import-workspace>
                <div class="footer">
                    <div class="row m-3 footer_btn">
                        <div class="col-4">
                            <button class="btn btn-secondary btn-block" [disabled]="importStepper.selectedIndex === 0"
                                (click)="previousStep()">
                                Back
                            </button>
                        </div>
                        <div class="col-4" *ngIf="importFromId === '3.3'">
                            <button class="btn btn-primary btn-block" [disabled]="false"
                                (click)="getValidateStepOne() ? workspaceId === 1 ? workspaceConfirmation() : nextStep() : ''">
                                Next
                            </button>
                        </div>
                        <div class="col-4" *ngIf="importFromId === '2.x' || importFromId === '3.1'">
                            <button class="btn btn-primary btn-block" [disabled]="false"
                                (click)="getValidateStepOne() ? workspaceId === 1 ? workspaceConfirmation() : importWs() : ''">
                                Import
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-secondary btn-block" [disabled]="false" (click)="onCancel()">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </mat-step>
            <mat-step label="Details" [editable]="true">
                <app-import-details (currentTabIndex)="currentTabIndex = $event"></app-import-details>
                <div class="footer">
                    <div class="row m-3 footer_btn">
                        <div class="col-4">
                            <button class="btn btn-secondary btn-block" [disabled]="false"
                                (click)="currentTabIndex === 1 ? previousTab(0) : currentTabIndex === 2 ? previousTab(1) : currentTabIndex === 3 ? previousTab(2) : currentTabIndex === 4 ? previousTab(3) : currentTabIndex === 5 ? previousTab(4) : currentTabIndex === 6 ? previousTab(5) : previousStep()">
                                Back
                            </button>
                        </div>
                        <!-- Application parameter tab is removed for JIRA TEI-5307 -->
                        <!-- <div class="col-4">
                            <button class="btn btn-primary btn-block" [disabled]="false"
                                (click)="currentTabIndex === 0 ? nextTab(1) : currentTabIndex === 1 ? nextTab(2) : currentTabIndex === 2 ? nextTab(3) : currentTabIndex === 3 ? nextTab(4) : currentTabIndex === 4 ? nextTab(5) : currentTabIndex === 5 ? nextTab(6) : importWs()">
                                {{currentTabIndex === 6 ? 'Import' : 'Next'}}
                            </button>
                        </div> -->
                        <div class="col-4">
                            <button class="btn btn-primary btn-block" [disabled]="false"
                                (click)="currentTabIndex === 0 ? nextTab(1) : currentTabIndex === 1 ? nextTab(2) : currentTabIndex === 2 ? nextTab(3) : currentTabIndex === 3 ? nextTab(4) : currentTabIndex === 4 ? nextTab(5) : currentTabIndex === 5 ? importWs() : importWs()">
                                {{currentTabIndex === 5 ? 'Import' : 'Next'}}
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-secondary btn-block" [disabled]="false" (click)="onCancel()">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </mat-step>
            <mat-step label="Summary" [editable]="true">
                <app-import-summary (currentTabIndex)="currentTabIndex = $event"></app-import-summary>
                <div class="footer">
                    <div class="row m-3 footer_btn">
                        <ng-container *ngIf="importFromId === '2.x'; else otherImportFromId">
                            <div class="col-4">
                                <button class="btn btn-secondary btn-block" [disabled]="false"
                                    (click)="currentTabIndex === 1 ? previousTab(0) : currentTabIndex === 2 ? previousTab(1) : currentTabIndex === 3 ? previousTab(2) : currentTabIndex === 4 ? previousTab(3) : currentTabIndex === 5 ? previousTab(4) : currentTabIndex === 6 ? previousTab(5) : currentTabIndex === 7 ? previousTab(6) : previousStep()">
                                    Back
                                </button>
                            </div>
                            <div class="col-4">
                                <button class="btn btn-primary btn-block" [disabled]="false"
                                    (click)="currentTabIndex === 0 ? nextTab(1) : currentTabIndex === 1 ? nextTab(2) : currentTabIndex === 2 ? nextTab(3) : currentTabIndex === 3 ? nextTab(4) : currentTabIndex === 4 ? nextTab(5) : currentTabIndex === 5 ? nextTab(6) : nextStep()">
                                    Next
                                </button>
                            </div>
                        </ng-container>
                        <ng-template #otherImportFromId>
                            <div class="col-4">
                                <button class="btn btn-secondary btn-block" [disabled]="false"
                                    (click)="currentTabIndex === 1 ? previousTab(0) : currentTabIndex === 2 ? previousTab(1) : currentTabIndex === 3 ? previousTab(2) : currentTabIndex === 4 ? previousTab(3) : currentTabIndex === 5 ? previousTab(4) : currentTabIndex === 6 ? previousTab(5) : currentTabIndex === 7 ? previousTab(6) : previousStep()">
                                    Back
                                </button>
                            </div>
                            <div class="col-4">
                                <!-- Application parameter tab is removed for JIRA TEI-5307 -->
                                <!-- <button class="btn btn-primary btn-block" [disabled]="false"
                                    (click)="currentTabIndex === 0 ? nextTab(1) : currentTabIndex === 1 ? nextTab(2) : currentTabIndex === 2 ? nextTab(3) : currentTabIndex === 3 ? nextTab(4) : currentTabIndex === 4 ? nextTab(5) : currentTabIndex === 5 ? nextTab(6) : currentTabIndex === 6 ? nextTab(7) : nextStep()">
                                    Next
                                </button> -->
                                <button class="btn btn-primary btn-block" [disabled]="false"
                                    (click)="currentTabIndex === 0 ? nextTab(1) : currentTabIndex === 1 ? nextTab(2) : currentTabIndex === 2 ? nextTab(3) : currentTabIndex === 3 ? nextTab(4) : currentTabIndex === 4 ? nextTab(5) : currentTabIndex === 5 ? nextTab(6) : currentTabIndex === 6 ? nextStep() : nextStep()">
                                    Next
                                </button>
                            </div>
                        </ng-template>
                        <div class="col-4">
                            <button class="btn btn-secondary btn-block" [disabled]="false" (click)="onCancel()">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </mat-step>
            <mat-step label="Default alert" [editable]="true">
                <app-import-alert></app-import-alert>
                <div class="footer">
                    <div class="row m-3 footer_btn">
                        <div class="col-4">
                            <!-- <button class="btn btn-secondary btn-block" [disabled]="false" (click)="previousStep()">
                                Back
                            </button> -->
                        </div>
                        <div class="col-4">
                            <button class="btn btn-primary btn-block" [disabled]="false" (click)="finishExport()">
                                Finish
                            </button>
                        </div>
                        <div class="col-4">
                            <!-- <button class="btn btn-secondary btn-block" [disabled]="false" (click)="onCancel()">
                                Cancel
                            </button> -->
                        </div>
                    </div>
                </div>
            </mat-step>
        </mat-stepper>
    </ng-container>
