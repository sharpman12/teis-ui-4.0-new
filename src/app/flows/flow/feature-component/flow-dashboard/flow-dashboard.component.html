<div class="wrapper">
        <p-scrollPanel [style]="{width: '100%', height: '100%'}" styleClass="customscrollbar-gray">  
                <div class="container" >
                        <h1 class="font-weight-bold" style="    display: flex;
                        align-items: center;
                        padding-top: 4rem;
                        padding-bottom: 1.8rem;">Flow</h1>
                        <div class="row">
                                <app-flowcard *ngFor=" let card of cards; trackById" [card]="card"
                                [allCards]="cards" 
                                class="col-lg-4 col-sm-6 col-xs-12 cards px-2 py-2"></app-flowcard>
                        </div>                          
                </div>
        </p-scrollPanel>
   </div>
   
   <p-toast position="top-center" key="dashboardInfoKey">
        <ng-template let-message pTemplate="message">
            <div class="toast fade toast-info show" role="alert" aria-live="assertive" aria-atomic="true" style="min-width: 350px;">
                <div class="toast-header">
                    <span class="mr-4 lc-icon-Alert-alt" style="font-size: 2.2rem;"></span>
                    <span class="font-weight-bold mr-auto" style="font-size: 1.6rem;">Info</span>
                </div>
                <div class="toast-body">
                    <span>{{message.detail}}</span>
                </div>
            </div>
        </ng-template>
    </p-toast>
