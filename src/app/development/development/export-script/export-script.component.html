<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="font-weight-bold p-0 mb-0">Export</h2>
        <a class="btn btn-link p-0" (click)="onClose()">
            Close
        </a>
    </div>

    <ng-container>
        <div class="version_tbl">
            <table class="table table-bordered table-bordered-not-tbody">
                <thead class="thead-light">
                    <tr>
                        <th>Version no.</th>
                        <th>Date</th>
                        <th>User Name</th>
                        <th>Release Note</th>
                        <th>Deployed</th>
                        <th>Export</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let v of scriptsList">
                        <td class="text-center">
                            {{v?.versionNumber === 0 ? 'WC' : v?.versionNumber}}
                        </td>
                        <td>{{v?.createdOn}}</td>
                        <td>{{v?.createdBy}}</td>
                        <td>
                            {{v?.note ? v?.note : '-'}}
                        </td>
                        <td class="text-center">
                            <span *ngIf="v?.deployedVersion">
                                <i class="fa fa-check text-success fa-2x" aria-hidden="true"></i>
                            </span>
                        </td>
                        <td class="text-center">
                            <a class="btn btn-link p-0" [class.disabled]="false" (click)="exportScript(v)">
                                <span class="iconlabel mr-2 lc-icon-Export"></span>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </ng-container>
</div>
