<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div class="d-flex align-items-center">
            <h2 class="font-weight-bold p-0 mb-0">Parameter settings for debug</h2>
            <a class="btn btn-link d-inline-flex align-items-center pl-4 pt-0 pr-0 pb-0"
                (click)="hideAndShowScriptDebugParameters()">
                <ng-container *ngIf="isScriptDebugParameterShow">
                    <span class="iconlabel mr-2 eye-icon-slash"></span>
                    <span class="very-small-text">Additional information</span>
                </ng-container>
                <ng-container *ngIf="!isScriptDebugParameterShow">
                    <span class="iconlabel mr-2 eye-icon"></span>
                    <span class="very-small-text">Set/View parameters</span>
                </ng-container>
            </a>
        </div>

        <a class="btn btn-link p-0" (click)="onClose()">
            Close
        </a>
    </div>

    <ng-container *ngIf="isScriptDebugParameterShow">
        <div class="debug-parameter-tbl">
            <form [formGroup]="parametersForm">
                <div class="table-responsive">
                    <table class="table table-sm table-bordered table-bordered-not-tbody">
                        <thead class="thead-light text-center">
                            <tr>
                                <th>Name</th>
                                <th>Value</th>
                                <th style="width:15%">Data type</th>
                                <th style="width:10%">Remove</th>
                            </tr>
                        </thead>
                        <tbody formArrayName="currentParameter">
                            <tr *ngFor="let para of parametersForm.get('currentParameter')['controls']; let i = index"
                                [formGroupName]="i">
                                <td>
                                    <input class="form-control form-control-sm"
                                        [ngClass]="para.controls.paramType.value === 'Private' ? 'txt_italic' : ''"
                                        formControlName="name" type="text" />
                                </td>
                                <td>
                                    <select class="form-control form-control-sm"
                                        *ngIf="para.controls.dataType.value === 'Boolean'"
                                        [ngClass]="para.controls.paramType.value === 'Private' ? 'txt_italic' : ''"
                                        formControlName="value">
                                        <option value="">- Select -</option>
                                        <option value="true">yes</option>
                                        <option value="false">no</option>
                                    </select>
                                    <input class="form-control form-control-sm"
                                        *ngIf="para.controls.dataType.value !== 'Boolean'"
                                        [ngClass]="para.controls.paramType.value === 'Private' ? 'txt_italic' : ''"
                                        formControlName="value"
                                        [type]="para.controls.securityLevel.value === 'high' ? 'password' : para.controls.dataType.value === 'Numeric' ? 'number' : 'text'"
                                        [min]="para.controls.dataType.value === 'Numeric' ? 0 : null"
                                        [matAutocomplete]="autodebuginput" />
                                    <mat-autocomplete #autodebuginput="matAutocomplete">
                                        <mat-option
                                            *ngFor="let item of para.controls.probableValues.value  | searchFilter: para.controls.value.value : 'paramValues'"
                                            [value]="item?.paramValues">
                                            {{item?.paramValues}}
                                        </mat-option>
                                    </mat-autocomplete>
                                </td>
                                <td
                                    [ngClass]="para.controls.isNewParam.value || !para.controls.dataType.value ? 'additional_params' : ''">
                                    <input class="form-control form-control-sm"
                                        [ngClass]="(para.controls.paramType.value === 'Private' ? 'txt_italic' : '') + '' + (para.controls.isNewParam.value || !para.controls.dataType.value ? 'additional_params' : '')"
                                        formControlName="dataType" type="text" />
                                </td>
                                <td class="text-center">
                                    <a class="btn btn-link p-0" (click)="removeParameter(i)">
                                        <span class="iconlabel lc-icon-Trash-alt"></span>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button class="btn btn-link pl-0" (click)="addMoreParameters()">Add more...</button>
            </form>
        </div>
        <div class="row mt-5">
            <div class="col-4 offset-2">
                <button class="btn btn-secondary btn-block" (click)="onClose()">Close</button>
            </div>
            <div class="col-4">
                <button class="btn btn-primary btn-block" [disabled]="false" (click)="onSave()">Save</button>
            </div>
        </div>
    </ng-container>

    <ng-container *ngIf="!isScriptDebugParameterShow">
        <div class="form-row">
            <div class="form-group col-lg-6 col-md-6 col-12 mt-2">
                <label for="segrp" class="">Script engine group</label>
                <input type="text" class="form-control" id="scriptname" autocomplete="off"
                    [(ngModel)]="scriptEngineGrpName" readonly>
            </div>
            <div class="form-group col-lg-6 col-md-6 col-12 mt-2">
                <label for="se" class="">Script engine</label>
                <input type="text" class="form-control" id="scriptname" autocomplete="off"
                    [(ngModel)]="scriptEngineName" readonly>
            </div>
        </div>

        <div class="form-row">
            <div class="col-12 mt-2">
                <label for="appparam" class="">Application parameters</label>
            </div>
        </div>
        <form [formGroup]="applicationParametersForm">
            <div class="table-responsive">
                <table class="table table-sm table-bordered table-bordered-not-tbody">
                    <thead class="thead-light text-center">
                        <tr>
                            <th>Name</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody formArrayName="appParameter">
                        <tr *ngFor="let para2 of applicationParametersForm.get('appParameter')['controls']; let i = index"
                            [formGroupName]="i">
                            <td>
                                <input class="form-control form-control-sm" formControlName="name" type="text" readonly />
                            </td>
                            <td>
                                <input class="form-control form-control-sm" formControlName="value" type="text" readonly />
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </form>

        <div class="form-row">
            <div class="col-12 mt-2">
                <label for="glbparam" class="">Global parameters</label>
            </div>
        </div>
        <form [formGroup]="globalParametersForm">
            <div class="table-responsive">
                <table class="table table-sm table-bordered table-bordered-not-tbody">
                    <thead class="thead-light text-center">
                        <tr>
                            <th>Name</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody formArrayName="globalParameter">
                        <tr *ngFor="let para3 of globalParametersForm.get('globalParameter')['controls']; let i = index"
                            [formGroupName]="i">
                            <td>
                                <input class="form-control form-control-sm" formControlName="name" type="text" readonly />
                            </td>
                            <td>
                                <input class="form-control form-control-sm" formControlName="value" type="text" readonly />
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </form>
    </ng-container>
</div>
