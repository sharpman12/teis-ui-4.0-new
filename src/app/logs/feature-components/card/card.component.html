<ng-container>
    <div class="card lc-small-cards" (click)="onSelect(card)" tabindex="{{card.id}}">
        <div class="card-header">
            <div class="mr-2">
                <!-- {{card.errorCount}}{{card.avail}} -->

                <ng-container *ngIf="card.errorCount === 0">
                    <i [ngClass]="{'circleGray' : card.avail === undefined, 
                            'circlegreentick': card.avail === true,
                            'pendingicon':card.avail === false}">
                    </i>
                </ng-container>
                <i [ngClass]="{'circleredtick' : card.errorCount>0}"></i>
            </div>
            <div class="card-title px-1 font-weight-bold" innerHtml="{{card.name}}"></div>
            <div class="push" style="display: flex;
                    flex-direction: row;
                    align-items: center;">

                <div class="dropdown" *ngIf="card.defaultValue==false">

                    <button (click)="openDD($event)" class="no-bg-border-btn">
                        <i class="lc-icon-More"></i></button>

                    <div class="dropdown-menu " [style.display]="openDropDown ? 'block' : 'none'"
                        (blur)="closeDD($event)">
                        <a class="dropdown-item" href="javascript:void(0)" (click)="editCard(card.id, $event)">Edit</a>
                        <a class="dropdown-item" href="javascript:void(0)"
                            (click)="deleteCard(card.id, $event, card.name)">Remove</a>
                    </div>
                </div>
                <ng-container *ngIf="!card.loadCardStatus">
                    <a class="sync_icon loader-container" (click)="refreshLogCardById(card, $event)">
                        <span class="iconlabel icon-refresh lovicon-Z-axis-rotation"></span>
                    </a>

                </ng-container>
                <ng-container *ngIf="card.loadCardStatus">
                    <div class="loader-container">
                        <span class="sync_icon loading"></span>
                    </div>
                </ng-container>
            </div>
        </div>
        <div class="card-body">
            <p class="card-text ellipse pre-line-text" ellipsis [ellipsis-content]="card.description" #ell="ellipsis">
            </p>
        </div>
    </div>
    <ng-container>

        <!-- Removed Log Card Confirmation Model -->
        <div class="modal bd-example-modal-sm" [style.display]="showModalRemoveCard ? 'block' : 'none'">
            <div class="overlay" style=" background-color: rgba(0,0,0,0.5); width: 100%; height: 100%">
                <div class="modal-dialog modal-dialog-centered modal-sm">

                    <div class="modal-content">

                        <div class="modal-header modal-header--confirmation">
                            <span class="icon infoIcon bigger_icon "></span>
                        </div>
                        <div class="modal-body text-center">
                            <h2 class="font-weight-light">Are you sure you want to remove this log card?</h2>
                        </div>

                        <div class="modal-footer">
                            <div class="row">
                                <div class="col">
                                    <button type="button" class="btn btn-block btn-secondary"
                                        (click)="removedCard(card.id, $event, card.name)">Yes</button>
                                </div>
                                <div class="col">
                                    <button type="button" class="btn btn-block btn-info"
                                        (click)="cancelRemovedCard()">No</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
