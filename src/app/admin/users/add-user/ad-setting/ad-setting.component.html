<div class="container mb-5">
    <h2 class="font-weight-bold">AD setting</h2>
    <form [formGroup]="adSesstingForm" (ngSubmit)="updateAdSettings(adSesstingForm.value)">
        <div class="form-row">
            <div class="form-group col-lg-6 col-md-6 col-12 mt-4">
                <label for="fname" class="required">User name</label>
                <input type="text" class="form-control" [ngClass]="{'is-invalid': (formErrors.ldapUsername)}" id="fname" formControlName="ldapUsername" (blur)="logValidationErrors()" autocomplete="off">
                <div *ngIf="formErrors.ldapUsername">
                    <div class="input-validation-error-message">{{formErrors.ldapUsername}}</div>
                </div>
            </div>
            <div class="form-group col-lg-6 col-md-6 col-12 mt-4">
                <label for="pw" class="required">Password</label>
                <input type="password" class="form-control" [ngClass]="{'is-invalid': (formErrors.ldapPassword)}" id="pw" formControlName="ldapPassword" (blur)="logValidationErrors()" autocomplete="off">
                <div *ngIf="formErrors.ldapPassword">
                    <div class="input-validation-error-message">{{formErrors.ldapPassword}}</div>
                </div>
            </div>
            <div class="form-group col-lg-6 col-md-6 col-12 mt-4">
                <label for="url" class="required">Url</label>
                <input type="text" class="form-control" [ngClass]="{'is-invalid': (formErrors.ldapUrl)}" id="url" formControlName="ldapUrl" (blur)="logValidationErrors()" autocomplete="off">
                <div *ngIf="formErrors.ldapUrl">
                    <div class="input-validation-error-message">{{formErrors.ldapUrl}}</div>
                </div>
            </div>
            <div class="form-group col-lg-6 col-md-6 col-12 mt-4">
                <label for="domain" class="required">Domain</label>
                <input type="text" class="form-control" [ngClass]="{'is-invalid': (formErrors.ldapDomain)}" id="domain" formControlName="ldapDomain" (blur)="logValidationErrors()" autocomplete="off">
                <div *ngIf="formErrors.ldapDomain">
                    <div class="input-validation-error-message">{{formErrors.ldapDomain}}</div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-4 offset-2">
                <button class="btn btn-secondary btn-block" type="button" (click)="onCancel()">Cancel</button>
            </div>
            <div class="col-4">
                <button class="btn btn-primary btn-block" type="submit" [disabled]="!adSesstingForm.valid">Update</button>
            </div>
        </div>
    </form>
</div>
