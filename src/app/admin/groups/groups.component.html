<div class="">
    <div class="row">
        <div class="col-lg-12 col-md-12 col-12 d-flex">
            <h1 class="font-weight-bold">Groups</h1>
            <a class="btn btn-link addBtn" *ngIf="isAdminCURDAccess" routerLink='./addgroup'>
                <span class="mr-2 lc-icon-Add"></span>
                <span class="font-weight-normal">Add group</span>
            </a>
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-lg-4 col-md-4 col-12 border-right pl-0 group_list_section">
            <div class="container">
                <input type="text" class="form-control empty" #searchGroup placeholder=" &#xF002; Search"
                    autocomplete="off" [(ngModel)]="searchGroupName">
                <div class="loader text-primary" *ngIf="isSearching">
                    Searching
                    <span class="loader__dot">.</span>
                    <span class="loader__dot">.</span>
                    <span class="loader__dot">.</span>
                </div>
                <div class="mt-4">
                    <div class="row">
                        <div class="custom-control custom-checkbox ml-4" *ngIf="currentUser?.adminUser">
                            <input type="checkbox" class="custom-control-input" id="gou" [(ngModel)]="isOrdinaryUser"
                                (change)="onChangeFilter()">
                            <label class="custom-control-label" for="gou">Ordinary group(s)</label>
                        </div>
                        <div class="custom-control custom-checkbox ml-4"
                            *ngIf="currentUser?.superAdminUser || currentUser?.adminUser">
                            <input type="checkbox" class="custom-control-input" id="gad" [(ngModel)]="isAdmin"
                                (change)="onChangeFilter()">
                            <label class="custom-control-label" for="gad">Admin(s)</label>
                        </div>
                        <div class="custom-control custom-checkbox ml-4" *ngIf="currentUser?.superAdminUser">
                            <input type="checkbox" class="custom-control-input" id="gsa" [(ngModel)]="isSuperAdmin"
                                (change)="onChangeFilter()">
                            <label class="custom-control-label" for="gsa">Super admin(s)</label>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <ng-container *ngIf="allGroups?.length; else noDataFound">
                        <ul class="" *ngFor="let group of allGroups | filter:term">
                            <li (click)="getGroupById(group.id)" [class.active]="group.id === activeGroup">
                                <div class="title">
                                    <span class="usre_group" [ngClass]="[group.color]"></span>
                                    <span class="gp_name ml-1">{{group?.name}}</span>
                                    <span class="user_count">({{group?.users.length}})</span>
                                    <span class="gp_name g_badge ml-4" *ngIf="group?.recentlyAdded">Recently
                                        added</span>
                                    <span class="gp_name g_badge ml-4" *ngIf="group?.recentlyUpdated">Recently
                                        updated</span>
                                </div>
                            </li>
                        </ul>
                        <app-pagination *ngIf="isMoreResultLinkShow" [activePage]="1" [recordsPerPage]="5"
                            [totalRecords]="allGroups?.length"
                            (getNextPage)="getNextPageUserGroup($event)"></app-pagination>
                    </ng-container>
                    <ng-template #noDataFound>
                        <div>
                            <span class="text-center" style="display: grid;">No data found</span>
                        </div>
                    </ng-template>
                </div>
            </div>
        </div>
        <div class="col-lg-6 col-md-6 col-12 group_details pr-0 group_details_section">
            <div class="container" *ngIf="allGroups.length">
                <div class="row" *ngIf="isAdminCURDAccess">
                    <a class="btn btn-link" [class.disabled]="(group?.superAdminGroup && currentUser?.superAdminUser) || (group?.adminGroup && currentUser?.adminUser)" (click)="editGroup(group?.id)">
                        <span class="iconlabel mr-2 lc-icon-Edit-alt-2"></span>
                        <span class="very-small-text">Edit</span>
                    </a>
                    <a class="btn btn-link" [class.disabled]="(group?.superAdminGroup && currentUser?.superAdminUser) || (group?.adminGroup && currentUser?.adminUser)" (click)="removeGroup(group?.id)">
                        <span class="iconlabel mr-2 lc-icon-Trash-alt"></span>
                        <span class="very-small-text">Remove</span>
                    </a>
                </div>
                <div class="mt-4">
                    <div class="mb-3">
                        <label>Group</label>
                        <p>{{group?.name}}</p>
                    </div>
                    <div class="">
                        <textarea class="form-control txtarea" autosize rows="1" cols="5" [value]="[group?.description]"
                            readonly></textarea>
                    </div>
                    <div class="mt-5">
                        <label>Profile</label>
                        <p>{{group?.profile?.name}}</p>
                    </div>
                    <div class="mt-3">
                        <label>Group members</label>
                        <div class="mt-2">
                            <ul *ngFor="let user of group?.users">
                                <li id="users">
                                    <span class="d-flex" (click)="updateUser(user?.id)">
                                        <span class="admin_user"></span> &nbsp;
                                        <span class="user_name">{{user?.firstName + ' ' + user?.lastName}}</span>
                                        <span class="gp_name g_badge ml-4" *ngIf="user?.recentlyUpdated">Recently
                                            updated</span>
                                    </span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
